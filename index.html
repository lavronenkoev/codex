<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P&L Приемная</title>
  <style>
    body { margin:0; font-family: Arial,sans-serif; background:#f3f5fa; color:#0f172a; }
    header { background:#0f172a; color:#fff; padding:12px 16px; }
    .wrap { max-width: 1600px; margin:0 auto; padding:14px; }
    .tabs { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
    .tabs button { border:1px solid #94a3b8; background:#fff; border-radius:8px; padding:8px 12px; cursor:pointer; }
    .tabs button.active { background:#2563eb; color:#fff; border-color:#2563eb; }
    .panel { background:#fff; border:1px solid #dbe2ef; border-radius:12px; padding:12px; margin-bottom:12px; }
    .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .grid4 { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; }
    .grid3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
    input,select,textarea { width:100%; padding:8px; box-sizing:border-box; border:1px solid #cbd5e1; border-radius:8px; }
    button { border:1px solid #94a3b8; border-radius:8px; background:#fff; padding:8px 10px; cursor:pointer; }
    button.primary { background:#2563eb; color:#fff; border-color:#2563eb; }
    table { width:100%; border-collapse: collapse; font-size:12px; }
    th,td { border:1px solid #e5e7eb; padding:6px; text-align:right; }
    th { background:#f8fafc; }
    td:first-child, th:first-child { text-align:left; }
    .muted { color:#475569; font-size:12px; }
    .warn { margin-top:8px; background:#fffbeb; border:1px solid #fde68a; border-radius:8px; padding:8px; color:#92400e; font-size:12px; }
    .err { color:#b91c1c; font-size:12px; }
    .kpi { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
    .card { border:1px solid #dbe2ef; border-radius:8px; padding:10px; background:#f8fafc; }
    .click { color:#1d4ed8; cursor:pointer; text-decoration:underline; }
    .modalBg { position:fixed; inset:0; background:rgba(15,23,42,.45); display:none; align-items:center; justify-content:center; z-index:40; }
    .modal { width:min(1000px,95vw); max-height:84vh; overflow:auto; border-radius:10px; background:#fff; padding:14px; }
  </style>
</head>
<body>
<header><b>P&L-калькулятор сервиса «Приемная»</b></header>
<div class="wrap">
  <div id="tabs" class="tabs"></div>
  <div id="view"></div>
</div>
<div id="formulaBg" class="modalBg">
  <div class="modal">
    <div class="row" style="justify-content:space-between"><h3 id="formulaTitle"></h3><button onclick="closeFormula()">Закрыть</button></div>
    <div id="formulaBody"></div>
  </div>
</div>
<div id="formulaBg" class="modalBg"><div class="modal"><div class="row" style="justify-content:space-between"><h3 id="formulaTitle"></h3><button onclick="closeFormula()">Закрыть</button></div><div id="formulaBody"></div></div></div>
<script>
const DAY_MS = 24 * 60 * 60 * 1000;
const fmt = v => Number(v || 0).toLocaleString('ru-RU', { maximumFractionDigits: 2 });
const d = s => new Date(`${s}T00:00:00`);
const ds = x => x.toISOString().slice(0, 10);
const monthKey = x => x.toISOString().slice(0, 7);
const daysInMonth = x => new Date(x.getFullYear(), x.getMonth() + 1, 0).getDate();
const daysInYear = x => (new Date(x.getFullYear(), 1, 29).getMonth() === 1 ? 366 : 365);
const eachDay = (start, end) => {
  const arr = [];
  for (let t = start.getTime(); t <= end.getTime(); t += DAY_MS) arr.push(new Date(t));
  return arr;
};

const DEFAULTS = {
  trial_days: 90,
  paid_share_after_trial: 0.5,
  free_share_after_trial: 0.5,
  trial_churn_rate_month: 0.01,
  paid_churn_rate_month: 0.01,
  free_churn_rate_month: 0.01,
  paid_to_free_rate_month: 0.01,
  calls_per_user_per_month: 111,
  share_calls_non_tm: 0.9245,

  share_l1: 0.60,
  share_l2: 0.15,
  share_l3: 0.15,
  share_l4: 0.10,
  hangup_l1: 0.01,
  hangup_l2: 0.16,
  hangup_l3: 0.16,
  hangup_l4: 0.16,

  type_useful: 0.35,
  type_info_confirm: 0.15,
  type_info_notify: 0.15,
  type_spam_hard: 0.15,
  type_spam_mid: 0.10,
  type_spam_light: 0.10,

  interconnect_rub_per_min: 0.93,
  interconnect_seconds_per_call: 60,
  subscription_price_month: 49,

  stt_seconds_per_call: 12,
  stt_rub_per_sec: 0.00011,

  llm_rub_per_1m_tokens: 45,
  llm_tokens_out: 400,
  llm_tokens_in: 120,
  llm_input_weight: 4,

  sms_cost_mts: 0.30,
  sms_cost_t2: 0,
  sms_share_mts: 0.18,
  sms_share_t2: 0.82,
  no_pickup_rate: 0.00048,
  sms_on_unknown_hangup: true,
  sms_on_light_spam: true,

  payroll_month: 9_930_000,
  infra_year: 570_000,

  tts_enabled: false,
  tts_rub_per_char: 0,
  tts_chars_per_call: 0,

  sanity_users_threshold: 20_000_000,
  paid_vip_escalation_share: 0.08,
};

function defaultRollout() {
  return {
    addsManual: [
      { date: '2026-01-01', value: 200 },
      { date: '2026-03-05', value: 300 },
      { date: '2026-03-16', value: 1300 },
      { date: '2026-03-30', value: 13000 },
      { date: '2026-04-13', value: 15000 },
      { date: '2026-04-27', value: 30000 },
    ],
    addsIntervals: [
      { start: '2026-05-04', end: '2026-05-07', intervalMode: 'per_day', total: 50000 },
      { start: '2026-05-11', end: '2026-05-14', intervalMode: 'per_day', total: 100000 },
      { start: '2026-05-18', end: '2026-05-21', intervalMode: 'per_day', total: 200000 },
      { start: '2026-05-25', end: '2026-05-28', intervalMode: 'per_day', total: 300000 },
      { start: '2026-06-01', end: '2026-06-04', intervalMode: 'per_day', total: 300000 },
      { start: '2026-06-08', end: '2026-06-11', intervalMode: 'per_day', total: 3000 },
    ],
    autoGrowth: [{ start: '2026-06-12', end: '2026-12-31', usersPerMonth: 75000 }],
  };
}

function createScenario(name = 'Базовый вариант') {
  const rollout = defaultRollout();
  return {
    id: Math.random().toString(36).slice(2, 10),
    name,
    comment: '',
    start: '2026-01-01',
    end: '2026-12-31',
    constants: { ...DEFAULTS },
    addsManual: rollout.addsManual,
    addsIntervals: rollout.addsIntervals,
    autoGrowth: rollout.autoGrowth,
    churnEvents: [],
  };
}

const SCENARIOS = [
  // DEMO
  { id: 'DEMO_UNKNOWN', title: 'Демо · Unknown Hangup', segment: 'trial', type: 'unknown' },
  { id: 'DEMO_USEFUL', title: 'Демо · Полезный', segment: 'trial', type: 'useful' },
  { id: 'DEMO_INFO_CONFIRM', title: 'Демо · Инфо подтверждение', segment: 'trial', type: 'info_confirm' },
  { id: 'DEMO_INFO_NOTIFY', title: 'Демо · Инфо уведомление', segment: 'trial', type: 'info_notify' },
  { id: 'DEMO_SPAM_HARD', title: 'Демо · Спам тяжелый', segment: 'trial', type: 'spam_hard' },
  { id: 'DEMO_SPAM_MID', title: 'Демо · Спам средний', segment: 'trial', type: 'spam_mid' },
  { id: 'DEMO_SPAM_LIGHT', title: 'Демо · Спам легкий', segment: 'trial', type: 'spam_light' },
  // PAID
  { id: 'PAID_UNKNOWN', title: 'Платная · Unknown Hangup', segment: 'paid', type: 'unknown' },
  { id: 'PAID_USEFUL', title: 'Платная · Полезный', segment: 'paid', type: 'useful' },
  { id: 'PAID_INFO_CONFIRM', title: 'Платная · Инфо подтверждение', segment: 'paid', type: 'info_confirm' },
  { id: 'PAID_INFO_NOTIFY', title: 'Платная · Инфо уведомление', segment: 'paid', type: 'info_notify' },
  { id: 'PAID_SPAM_HARD', title: 'Платная · Спам тяжелый', segment: 'paid', type: 'spam_hard' },
  { id: 'PAID_SPAM_MID', title: 'Платная · Спам средний', segment: 'paid', type: 'spam_mid' },
  { id: 'PAID_SPAM_LIGHT', title: 'Платная · Спам легкий', segment: 'paid', type: 'spam_light' },
  { id: 'PAID_VIP_ESC', title: 'Платная · VIP эскалация', segment: 'paid', type: 'vip_escalation' },
  // FREE (churned)
  { id: 'FREE_UNKNOWN', title: 'Бесплатная · Unknown Hangup', segment: 'free', type: 'unknown' },
  { id: 'FREE_USEFUL', title: 'Бесплатная · Полезный', segment: 'free', type: 'useful' },
  { id: 'FREE_INFO_CONFIRM', title: 'Бесплатная · Инфо подтверждение', segment: 'free', type: 'info_confirm' },
  { id: 'FREE_INFO_NOTIFY', title: 'Бесплатная · Инфо уведомление', segment: 'free', type: 'info_notify' },
  { id: 'FREE_SPAM_HARD', title: 'Бесплатная · Спам тяжелый', segment: 'free', type: 'spam_hard' },
  { id: 'FREE_SPAM_MID', title: 'Бесплатная · Спам средний', segment: 'free', type: 'spam_mid' },
  { id: 'FREE_SPAM_LIGHT', title: 'Бесплатная · Спам легкий', segment: 'free', type: 'spam_light' },
];

const STORAGE_KEY = 'priemnaya_pl_scenarios_v4';

function normalizeScenario(raw) {
  const base = createScenario();
  const src = raw && typeof raw === 'object' ? raw : {};
  return {
    ...base,
    ...src,
    constants: { ...base.constants, ...(src.constants && typeof src.constants === 'object' ? src.constants : {}) },
    addsManual: Array.isArray(src.addsManual) ? src.addsManual : base.addsManual,
    addsIntervals: Array.isArray(src.addsIntervals) ? src.addsIntervals.map(r => ({
      start: r.start || base.start,
      end: r.end || base.end,
      intervalMode: r.intervalMode === 'per_day' ? 'per_day' : 'total',
      total: Number(r.total) || 0,
    })) : base.addsIntervals,
    autoGrowth: Array.isArray(src.autoGrowth) ? src.autoGrowth : base.autoGrowth,
    churnEvents: Array.isArray(src.churnEvents) ? src.churnEvents : base.churnEvents,
  };
}

function loadScenarios() {
  try {
    const x = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    if (!Array.isArray(x)) return [];
    return x.map(normalizeScenario);
  } catch {
    return [];
  }
}
function saveScenarios() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.scenarios)); }

const state = {
  tab: 'variants',
  selectedId: null,
  mode: 'year',
  month: '2026-06',
  compareIds: [],
  scenarioIdsInSummary: [],
  scenarios: loadScenarios(),
};
if (!state.scenarios.length) state.scenarios = [createScenario()];
if (!state.selectedId) state.selectedId = state.scenarios[0].id;
if (!state.scenarioIdsInSummary.length) state.scenarioIdsInSummary = state.scenarios.map(s => s.id);

const selected = () => state.scenarios.find(s => s.id === state.selectedId);

function validateScenario(s) {
  const c = s.constants;
  const errors = [];
  const levels = c.share_l1 + c.share_l2 + c.share_l3 + c.share_l4;
  const types = c.type_useful + c.type_info_confirm + c.type_info_notify + c.type_spam_hard + c.type_spam_mid + c.type_spam_light;
  if (Math.abs(levels - 1) > 1e-8) errors.push('Сумма долей L1-L4 должна быть 1.');
  if (Math.abs(types - 1) > 1e-8) errors.push('Сумма долей типов звонков должна быть 1.');
  Object.entries(c).forEach(([k, v]) => {
    if (typeof v === 'number' && (!Number.isFinite(v) || v < 0)) errors.push(`Некорректная константа: ${k}`);
  });
  return errors;
}

function buildAddsMap(s) {
  const map = new Map();
  const add = (date, v) => map.set(date, (map.get(date) || 0) + Math.max(0, Number(v) || 0));

  s.addsManual.forEach(r => add(r.date, r.value));
  s.addsIntervals.forEach(r => {
    const start = d(r.start), end = d(r.end);
    if (end < start) return;
    const days = Math.floor((end - start) / DAY_MS) + 1;
    const perDay = r.intervalMode === 'per_day' ? (Number(r.total) || 0) : (Number(r.total) || 0) / days;
    eachDay(start, end).forEach(day => add(ds(day), perDay));
  });
  s.autoGrowth.forEach(r => {
    const start = d(r.start), end = d(r.end);
    if (end < start) return;
    eachDay(start, end).forEach(day => add(ds(day), (Number(r.usersPerMonth) || 0) / daysInMonth(day)));
  });
  return map;
}

function emptyScenarioRow(s) {
  return {
    id: s.id,
    title: s.title,
    calls: 0,
    interconnectSeconds: 0,
    revenueInterconnect: 0,
    costSTT: 0,
    costLLMClassification: 0,
    costLLMDialog: 0,
    costLLMSummary: 0,
    costSMS: 0,
    totalVariableCosts: 0,
    contributionMargin: 0,
  };
}

function runScenario(s) {
  const errors = validateScenario(s);
  if (errors.length) return { errors, daily: [], scenarioRows: [], pnl: null, warnings: [], kpi: null };

  const c = s.constants;
  const start = d(s.start), end = d(s.end);
  if (end < start) return { errors: ['Дата окончания раньше даты старта.'], daily: [], scenarioRows: [], pnl: null, warnings: [], kpi: null };

  // full reset each run
  const addsByDay = buildAddsMap(s);
  const queue = Array.from({ length: c.trial_days }, () => 0);
  const daily = [];

  const trialChurn = c.trial_churn_rate_month / 30;
  const paidChurn = c.paid_churn_rate_month / 30;
  const freeChurn = c.free_churn_rate_month / 30;
  const paidToFreeRate = c.paid_to_free_rate_month / 30;

  const unknownShare = c.share_l1 * c.hangup_l1 + c.share_l2 * c.hangup_l2 + c.share_l3 * c.hangup_l3 + c.share_l4 * c.hangup_l4;
  const determinedShare = 1 - unknownShare;

  let paid = 0;
  let free = 0;

  for (const day of eachDay(start, end)) {
    const key = ds(day);
    const dim = daysInMonth(day);
    const diy = daysInYear(day);
    const adds = addsByDay.get(key) || 0;

    // order fixed per spec
    queue[queue.length - 1] += adds;
    for (let i = 0; i < queue.length; i++) queue[i] = Math.max(0, queue[i] * (1 - trialChurn));
    const matured = queue[0] || 0;
    for (let i = 0; i < queue.length - 1; i++) queue[i] = queue[i + 1];
    queue[queue.length - 1] = 0;

    paid += matured * c.paid_share_after_trial;
    free += matured * c.free_share_after_trial;

    const paidToFree = paid * paidToFreeRate;
    paid -= paidToFree;
    free += paidToFree;

    paid -= paid * paidChurn;
    free -= free * freeChurn;

    s.churnEvents.filter(x => x.date === key).forEach(ev => {
      const v = Math.max(0, Number(ev.value) || 0);
      if (ev.group === 'paid') paid -= v;
      if (ev.group === 'free') free -= v;
      if (ev.group === 'trial') {
        let rem = v;
        for (let i = queue.length - 1; i >= 0 && rem > 0; i--) {
          const take = Math.min(rem, queue[i]);
          queue[i] -= take;
          rem -= take;
        }
      }
    });

    paid = Math.max(0, paid);
    free = Math.max(0, free);
    for (let i = 0; i < queue.length; i++) queue[i] = Math.max(0, queue[i]);

    const trial = queue.reduce((a, b) => a + b, 0);
    const total = trial + paid + free;

    const callsTotal = total * c.calls_per_user_per_month / dim;
    const callsNonTm = callsTotal * c.share_calls_non_tm;

    daily.push({
      date: key,
      month: monthKey(day),
      adds,
      trial,
      paid,
      free,
      total,
      callsTotal,
      callsNonTm,
      payrollCost: c.payroll_month / dim,
      infraCost: c.infra_year / diy,
      unknownShare,
      determinedShare,
    });
  }

  const scenarioRows = SCENARIOS.map(emptyScenarioRow);
  const byId = Object.fromEntries(scenarioRows.map(x => [x.id, x]));

  const smsPrice = c.sms_share_mts * c.sms_cost_mts + c.sms_share_t2 * c.sms_cost_t2;
  const llmReqPrice = (c.llm_tokens_out + c.llm_tokens_in * c.llm_input_weight) * c.llm_rub_per_1m_tokens / 1_000_000;

  for (const row of daily) {
    const segmentCalls = {
      trial: row.callsNonTm * (row.trial / (row.total || 1)),
      paid: row.callsNonTm * (row.paid / (row.total || 1)),
      free: row.callsNonTm * (row.free / (row.total || 1)),
    };

    const shares = {
      useful: c.type_useful,
      info_confirm: c.type_info_confirm,
      info_notify: c.type_info_notify,
      spam_hard: c.type_spam_hard,
      spam_mid: c.type_spam_mid,
      spam_light: c.type_spam_light,
    };

    for (const scenario of SCENARIOS) {
      const baseCalls = segmentCalls[scenario.segment];
      const unknownCalls = baseCalls * row.unknownShare;
      const determinedCalls = baseCalls * row.determinedShare;

      let calls = 0;
      if (scenario.type === 'unknown') calls = unknownCalls;
      else if (scenario.type === 'vip_escalation') calls = determinedCalls * shares.useful * c.paid_vip_escalation_share;
      else calls = determinedCalls * (shares[scenario.type] || 0);

      if (scenario.id === 'PAID_USEFUL') calls = determinedCalls * shares.useful * (1 - c.paid_vip_escalation_share);

      const interconnectSeconds = calls * c.interconnect_seconds_per_call;
      const revenueInterconnect = interconnectSeconds * (c.interconnect_rub_per_min / 60);

      const costSTT = scenario.type === 'unknown' ? 0 : calls * c.stt_seconds_per_call * c.stt_rub_per_sec;
      const llmClassReq = scenario.type === 'unknown' ? 0 : calls * c.share_l4;
      const llmDialogReq = scenario.type === 'unknown' ? 0 : calls * (c.share_l3 + c.share_l4);
      const llmSummaryReq = llmDialogReq;

      const costLLMClassification = llmClassReq * llmReqPrice;
      const costLLMDialog = llmDialogReq * llmReqPrice;
      const costLLMSummary = llmSummaryReq * llmReqPrice;

      let smsCount = 0;
      if (scenario.type === 'unknown' && c.sms_on_unknown_hangup) smsCount = calls;
      if (scenario.type === 'spam_light' && c.sms_on_light_spam) smsCount = calls;
      if (['useful', 'info_confirm', 'info_notify', 'vip_escalation'].includes(scenario.type)) smsCount = calls * c.no_pickup_rate;
      const costSMS = smsCount * smsPrice;

      const totalVariableCosts = costSTT + costLLMClassification + costLLMDialog + costLLMSummary + costSMS;
      const contributionMargin = revenueInterconnect - totalVariableCosts;

      const dst = byId[scenario.id];
      dst.calls += calls;
      dst.interconnectSeconds += interconnectSeconds;
      dst.revenueInterconnect += revenueInterconnect;
      dst.costSTT += costSTT;
      dst.costLLMClassification += costLLMClassification;
      dst.costLLMDialog += costLLMDialog;
      dst.costLLMSummary += costLLMSummary;
      dst.costSMS += costSMS;
      dst.totalVariableCosts += totalVariableCosts;
      dst.contributionMargin += contributionMargin;
    }
  }

  const revenueInterconnect = scenarioRows.reduce((a, r) => a + r.revenueInterconnect, 0);
  const revenueSubscription = daily.reduce((a, r) => a + r.paid * c.subscription_price_month / daysInMonth(d(r.date)), 0);
  const totalRevenue = revenueInterconnect + revenueSubscription;

  const stt = scenarioRows.reduce((a, r) => a + r.costSTT, 0);
  const llmClassification = scenarioRows.reduce((a, r) => a + r.costLLMClassification, 0);
  const llmDialog = scenarioRows.reduce((a, r) => a + r.costLLMDialog, 0);
  const llmSummary = scenarioRows.reduce((a, r) => a + r.costLLMSummary, 0);
  const llmTotal = llmClassification + llmDialog + llmSummary;
  const sms = scenarioRows.reduce((a, r) => a + r.costSMS, 0);
  const tts = c.tts_enabled ? daily.reduce((a, r) => a + r.callsNonTm * c.tts_chars_per_call * c.tts_rub_per_char, 0) : 0;
  const totalVariableCosts = stt + llmTotal + sms + tts;

  const fixedPayroll = daily.reduce((a, r) => a + r.payrollCost, 0);
  const fixedInfra = daily.reduce((a, r) => a + r.infraCost, 0);
  const totalFixedCosts = fixedPayroll + fixedInfra;
  const profit = totalRevenue - totalVariableCosts - totalFixedCosts;

  const warnings = [];
  const endUsers = daily.length ? daily[daily.length - 1].total : 0;
  const avgUsers = daily.length ? daily.reduce((a, r) => a + r.total, 0) / daily.length : 0;
  const callsPerAvgUser = avgUsers > 0 ? daily.reduce((a, r) => a + r.callsTotal, 0) / avgUsers : 0;
  if (endUsers > c.sanity_users_threshold) warnings.push(`Пользователи на конец периода (${fmt(endUsers)}) больше порога (${fmt(c.sanity_users_threshold)}). Проверьте раскатку.`);
  if (c.calls_per_user_per_month < 1 || c.calls_per_user_per_month > 500) warnings.push('calls_per_user_per_month вне диапазона [1..500].');
  if (callsPerAvgUser < 4) warnings.push(`calls_total_period / avg_users_period = ${fmt(callsPerAvgUser)}. Похоже на слишком мало звонков.`);

  for (const row of daily) {
    if (row.trial < -1e-9 || row.paid < -1e-9 || row.free < -1e-9 || row.total < -1e-9) errors.push(`Отрицательные значения в ${row.date}`);
    if (Math.abs(row.total - (row.trial + row.paid + row.free)) > 1e-6) errors.push(`Нарушен инвариант total=trial+paid+free в ${row.date}`);
  }

  const kpi = {
    plannedAdds: Array.from(addsByDay.values()).reduce((a, b) => a + b, 0),
    endUsers,
    avgUsers,
  };

  return {
    errors,
    warnings,
    daily,
    scenarioRows,
    kpi,
    pnl: {
      revenueInterconnect,
      revenueSubscription,
      totalRevenue,
      stt,
      llmClassification,
      llmDialog,
      llmSummary,
      llmTotal,
      sms,
      tts,
      totalVariableCosts,
      fixedPayroll,
      fixedInfra,
      totalFixedCosts,
      profit,
    },
  };
}

function sliceResult(result, mode, month) {
  if (mode === 'year') return result;
  const rows = result.daily.filter(r => r.month === month);
  if (!rows.length) {
    return {
      ...result,
      daily: [],
      scenarioRows: result.scenarioRows.map(x => ({
        ...x,
        calls: 0,
        interconnectSeconds: 0,
        revenueInterconnect: 0,
        costSTT: 0,
        costLLMClassification: 0,
        costLLMDialog: 0,
        costLLMSummary: 0,
        costSMS: 0,
        totalVariableCosts: 0,
        contributionMargin: 0,
      })),
      pnl: {
        ...result.pnl,
        revenueInterconnect: 0,
        revenueSubscription: 0,
        totalRevenue: 0,
        stt: 0,
        llmClassification: 0,
        llmDialog: 0,
        llmSummary: 0,
        llmTotal: 0,
        sms: 0,
        tts: 0,
        totalVariableCosts: 0,
        fixedPayroll: 0,
        fixedInfra: 0,
        totalFixedCosts: 0,
        profit: 0,
      },
    };
  }
  const tmp = structuredClone(selected());
  tmp.start = rows[0].date;
  tmp.end = rows[rows.length - 1].date;
  return runScenario(tmp);
}

const formulaCache = new Map();
function putFormula(key, title, steps) {
  formulaCache.set(key, { title, steps });
}
function clickable(key, value, title, steps) {
  putFormula(key, title, steps);
  return `<span class="click" onclick="openFormula('${key}')">${fmt(value)}</span>`;
}
function openFormula(key) {
  const f = formulaCache.get(key);
  if (!f) return;
  document.getElementById('formulaTitle').textContent = f.title;
  document.getElementById('formulaBody').innerHTML = `<div class="panel">${f.steps.map((x, i) => `<div style='margin:4px 0'><b>Шаг ${i+1}.</b> ${x}</div>`).join('')}</div>`;
  document.getElementById('formulaBg').style.display = 'flex';
}
function closeFormula() { document.getElementById('formulaBg').style.display = 'none'; }

function renderResults() {

  const picked = state.scenarios.filter(s => state.scenarioIdsInSummary.includes(s.id));
  return `<div class="panel"><div class="row">
      <label style="width:180px">Режим<select onchange="setMode(this.value)"><option value="year" ${state.mode==='year'?'selected':''}>За период</option><option value="month" ${state.mode==='month'?'selected':''}>За месяц</option></select></label>

    </div>
    <div class="row">${state.scenarios.map(s => `<label><input type="checkbox" ${state.scenarioIdsInSummary.includes(s.id)?'checked':''} onchange="toggleSummaryScenario('${s.id}',this.checked)"> ${s.name}</label>`).join('')}</div>
  </div>
  ${picked.map((s, idx) => {
    const res = sliceResult(runScenario(s), state.mode, state.month);
    if (res.errors.length) return `<div class="panel err">${s.name}: ${res.errors.join('; ')}</div>`;
    return renderScenarioBlock(s, res, `sc${idx}`);
  }).join('')}`;
}

function compareRows() {
  const selectedVariants = state.scenarios.filter(s => state.compareIds.includes(s.id));
  if (selectedVariants.length < 2) return [];
  const base = sliceResult(runScenario(selectedVariants[0]), state.mode, state.month).pnl;
  return selectedVariants.map(s => {
    const p = sliceResult(runScenario(s), state.mode, state.month).pnl;
    const pct = base.profit === 0 ? 0 : (p.profit - base.profit) / base.profit * 100;
    return { variant: s.name, revenue: p.totalRevenue, variable: p.totalVariableCosts, fixed: p.totalFixedCosts, profit: p.profit, dAbs: p.profit - base.profit, dPct: pct };
  });
}

function renderCompare() {
  const rows = compareRows();
  return `<div class="panel"><div class="row">${state.scenarios.map(s => `<label><input type="checkbox" ${state.compareIds.includes(s.id)?'checked':''} onchange="toggleCompare('${s.id}',this.checked)"> ${s.name}</label>`).join('')}</div>
    <table><thead><tr><th>Вариант</th><th>Total Revenue</th><th>Total Variable Costs</th><th>Total Fixed Costs</th><th>Profit</th><th>ΔProfit</th><th>ΔProfit %</th></tr></thead><tbody>
      ${rows.map(r => `<tr><td>${r.variant}</td><td>${fmt(r.revenue)}</td><td>${fmt(r.variable)}</td><td>${fmt(r.fixed)}</td><td>${fmt(r.profit)}</td><td>${fmt(r.dAbs)}</td><td>${fmt(r.dPct)}</td></tr>`).join('')}
    </tbody></table></div>`;
}

function runStressTests() {
  const out = [];
  const test = (name, patch, expectError = false) => {
    const s = createScenario('stress');
    patch(s);
    const r = runScenario(s);
    const ok = expectError ? r.errors.length > 0 : r.errors.length === 0;
    out.push({ name, ok, reason: r.errors.join('; ') || 'OK' });
  };

  test('1. Нулевой мир', s => { s.addsManual = [{ date: s.start, value: 0 }]; s.addsIntervals=[]; s.autoGrowth=[]; });
  test('2. Одиночная раскатка', s => { s.addsManual = [{ date: s.start, value: 1 }]; s.addsIntervals=[]; s.autoGrowth=[]; });
  test('3. 100% trial churn', s => { s.constants.trial_churn_rate_month = 30; });
  test('4. 100% paid churn', s => { s.constants.paid_churn_rate_month = 30; });
  test('5. 100% paid_to_free', s => { s.constants.paid_to_free_rate_month = 30; });
  test('6. Экстремальный рост', s => { s.autoGrowth = [{ start: s.start, end: s.end, usersPerMonth: 1_000_000_000 }]; });
  test('7. Высокий churn на малой базе', s => { s.constants.free_churn_rate_month = 10; s.addsManual = [{ date: s.start, value: 3 }]; s.addsIntervals=[]; s.autoGrowth=[]; });
  test('8. Реальные дни месяца', s => { s.start='2026-01-01'; s.end='2026-03-31'; });
  test('9. share_calls_non_tm = 0', s => { s.constants.share_calls_non_tm = 0; });
  test('10. Невалидные доли', s => { s.constants.share_l1 = 0.9; s.constants.share_l2 = 0.9; }, true);
  test('11. SMS крайние случаи', s => { s.constants.sms_share_mts = 1; s.constants.sms_share_t2 = 0; s.constants.sms_cost_t2 = 10; });
  test('12. Проверка правил L1–L4', s => { s.constants.hangup_l1 = 0; s.constants.hangup_l4 = 1; });
  return out;
}

function renderStress() {
  const rows = runStressTests();
  return `<div class="panel"><table><thead><tr><th>Тест</th><th>Статус</th><th>Причина</th></tr></thead><tbody>
    ${rows.map(r => `<tr><td>${r.name}</td><td>${r.ok?'PASS':'FAIL'}</td><td>${r.reason}</td></tr>`).join('')}
  </tbody></table></div>`;
}
function renderCompare(){ const rows=compareRows(); return `<div class='panel'><div class='row'>${state.scenarios.map(s=>`<label><input type='checkbox' ${state.compareIds.includes(s.id)?'checked':''} onchange="toggleCompare('${s.id}',this.checked)"> ${s.name}</label>`).join('')}</div><table><thead><tr><th>Вариант</th><th>Total Revenue</th><th>Total Variable Costs</th><th>Total Fixed Costs</th><th>Profit</th><th>ΔProfit</th><th>ΔProfit %</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.variant}</td><td>${fmt(r.revenue)}</td><td>${fmt(r.variable)}</td><td>${fmt(r.fixed)}</td><td>${fmt(r.profit)}</td><td>${fmt(r.dAbs)}</td><td>${fmt(r.dPct)}</td></tr>`).join('')}</tbody></table></div>`; }

function render() {
  renderTabs();
  const map = { variants: renderVariants, editor: renderEditor, results: renderResults, compare: renderCompare, stress: renderStress };
  document.getElementById('view').innerHTML = map[state.tab]();
}

function pick(id){ state.selectedId=id; render(); }
function upd(k,v){ const s=selected(); s[k]=v; saveScenarios(); render(); }
function addScenario(){ const s=createScenario(`Вариант ${state.scenarios.length+1}`); state.scenarios.push(s); state.selectedId=s.id; state.scenarioIdsInSummary.push(s.id); saveScenarios(); render(); }
function cloneScenario(){ const s=selected(); const c=structuredClone(s); c.id=Math.random().toString(36).slice(2,10); c.name=`${s.name} (копия)`; state.scenarios.push(c); state.selectedId=c.id; state.scenarioIdsInSummary.push(c.id); saveScenarios(); render(); }
function deleteScenario(){ if(state.scenarios.length<2)return; state.scenarios=state.scenarios.filter(s=>s.id!==state.selectedId); state.compareIds=state.compareIds.filter(x=>x!==state.selectedId); state.scenarioIdsInSummary=state.scenarioIdsInSummary.filter(x=>x!==state.selectedId); state.selectedId=state.scenarios[0].id; saveScenarios(); render(); }

function addManual(){ selected().addsManual.push({date:selected().start,value:0}); saveScenarios(); render(); }
function addInterval(){ selected().addsIntervals.push({start:selected().start,end:selected().end,intervalMode:'total',total:0}); saveScenarios(); render(); }
function addAuto(){ selected().autoGrowth.push({start:selected().start,end:selected().end,usersPerMonth:0}); saveScenarios(); render(); }
function addChurnEvent(){ selected().churnEvents.push({date:selected().start,group:'paid',value:0}); saveScenarios(); render(); }
function resetRolloutToDefaults(){ const s=selected(); const r=defaultRollout(); s.addsManual=structuredClone(r.addsManual); s.addsIntervals=structuredClone(r.addsIntervals); s.autoGrowth=structuredClone(r.autoGrowth); saveScenarios(); render(); }

function delRow(kind,i){ const s=selected(); const map={manual:'addsManual',interval:'addsIntervals',auto:'autoGrowth',churn:'churnEvents'}; s[map[kind]].splice(i,1); saveScenarios(); render(); }
function setCell(kind,i,k,v){ const s=selected(); const map={manual:'addsManual',interval:'addsIntervals',auto:'autoGrowth',churn:'churnEvents'}; const isText=(k==='group'||k==='intervalMode'||k==='date'||k==='start'||k==='end'); s[map[kind]][i][k]=isText?v:Number(v); saveScenarios(); }
function setConst(k,v){ const s=selected(); if(v==='true'||v==='false') s.constants[k]=(v==='true'); else { const num=Number(v); s.constants[k]=Number.isFinite(num)?num:v; } saveScenarios(); }

function setMode(v){ state.mode=v; render(); }
function setMonth(v){ state.month=v; render(); }
function toggleCompare(id,on){ if(on&&!state.compareIds.includes(id)) state.compareIds.push(id); if(!on) state.compareIds=state.compareIds.filter(x=>x!==id); render(); }
function toggleSummaryScenario(id,on){ if(on&&!state.scenarioIdsInSummary.includes(id)) state.scenarioIdsInSummary.push(id); if(!on) state.scenarioIdsInSummary=state.scenarioIdsInSummary.filter(x=>x!==id); render(); }

render();
</script>
</body>
